name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  BASE_VERSION: "0.1"
  PYTHON_VERSION: "3.11"

jobs:
  windows-release:
    name: Windows installer release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install sidecar Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel
          .\.venv\Scripts\python.exe -m pip install pyinstaller BabelDOC

      - name: Set CI version
        shell: pwsh
        run: |
          $version = "${{ env.BASE_VERSION }}.${{ github.run_number }}"
          "PAGEWEAVE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $packageJsonPath = "package.json"
          $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
          $packageJson.version = $version
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content $packageJsonPath -Encoding utf8

          $tauriConfigPath = "src-tauri/tauri.conf.json"
          $tauriConfig = Get-Content $tauriConfigPath -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content $tauriConfigPath -Encoding utf8

          $cargoTomlPath = "src-tauri/Cargo.toml"
          $cargoTomlLines = Get-Content $cargoTomlPath
          $updatedPackageVersion = $false
          $cargoTomlLines = $cargoTomlLines | ForEach-Object {
            if (-not $updatedPackageVersion -and $_ -match '^version\s*=\s*".*"$') {
              $updatedPackageVersion = $true
              "version = `"$version`""
            } else {
              $_
            }
          }
          $cargoTomlLines | Set-Content $cargoTomlPath -Encoding utf8

      - name: Build BabelDOC sidecar
        shell: bash
        run: bash sidecar/build_sidecar.sh "$PWD/.venv/Scripts/python.exe"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: pageweave-v__VERSION__
          releaseName: PageWeave v__VERSION__
          releaseBody: |
            Automated PageWeave Windows build.

            Offline assets are published as a separate optional `offline_assets_*.zip` attachment.

            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload optional offline assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $asset = Get-ChildItem -Path "sidecar/assets" -Filter "offline_assets_*.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "offline_assets_*.zip was not generated"
          }
          gh release upload "pageweave-v$env:PAGEWEAVE_VERSION" $asset.FullName --clobber
